# nefarious-rs example configuration
# Block-based format compatible with C Nefarious ircd.conf.
# Supports nested includes: include "path/to/other.conf";

General {
    name        = "irc.example.net";
    description = "nefarious-rs IRC server";
    numeric     = 1;
    # vhost       = "203.0.113.10";       # outbound bind address
    # hidden_host_suffix = "users.example.net";  # base for +x cloaked hosts
};

Admin {
    Location = "Example Network";
    Contact  = "admin@example.net";
};

# ---------------------------------------------------------------------------
# Ports
# ---------------------------------------------------------------------------

Port {
    port = 6667;
    ssl  = no;
};

Port {
    port = 6697;
    ssl  = yes;
};

# ---------------------------------------------------------------------------
# Connection classes
# ---------------------------------------------------------------------------

Class {
    name        = "Users";
    pingfreq    = 1 minutes 30 seconds;
    maxlinks    = 200;
    sendq       = 512000;
};

Class {
    name        = "Opers";
    pingfreq    = 5 minutes;
    maxlinks    = 20;
    sendq       = 1024000;
};

Class {
    name        = "Servers";
    pingfreq    = 1 minutes;
    connectfreq = 5 minutes;
    maxlinks    = 10;
    sendq       = 4000000;
};

# ---------------------------------------------------------------------------
# Client allow-rules
# ---------------------------------------------------------------------------

Client {
    class    = "Users";
    ip       = "*";
    maxlinks = 5;
};

# ---------------------------------------------------------------------------
# Operator blocks
# ---------------------------------------------------------------------------

Operator {
    name     = "admin";
    password = "$2b$12$YourBcryptHashHere";   # bcrypt hashes supported
    host     = "*@*";
    class    = "Opers";
    local    = no;
    # privs = "local_kill global_kill";      # optional privilege override
};

# ---------------------------------------------------------------------------
# Server links
# ---------------------------------------------------------------------------

Connect {
    name        = "hub.example.net";
    host        = "hub.example.net";
    password    = "link-secret";
    port        = 4400;
    class       = "Servers";
    ssl         = yes;
    autoconnect = yes;
    hub         = yes;
};

# ---------------------------------------------------------------------------
# Local K-lines (host/IP bans enforced at connect time)
# ---------------------------------------------------------------------------

Kill {
    host   = "*.dialup.badnet.example";
    reason = "Dynamic ranges not permitted";
};

# Kill {
#     ip     = "198.51.100.0/24";
#     reason = "Blocked range";
# };

# ---------------------------------------------------------------------------
# WebIRC trusted gateways
# ---------------------------------------------------------------------------

# WebIRC {
#     password    = "gateway-secret";
#     host        = "gateway.example.net";
#     description = "Kiwi IRC gateway";
# };

# ---------------------------------------------------------------------------
# DNSBL zones
# ---------------------------------------------------------------------------

DnsBL {
    domain = "zen.spamhaus.org";
    action = "block";
    reason = "Listed in Spamhaus ZEN";
};

DnsBL {
    domain      = "dnsbl.dronebl.org";
    reply_mask  = "0.0.0.6";           # only match specific reply codes
    action      = "block_anon";        # block unless authenticated
    reason      = "Open proxy detected";
};

# DnsBL {
#     domain = "trusted-rbl.example.net";
#     action = "whitelist";            # always allow if listed
# };

# ---------------------------------------------------------------------------
# Features (network-wide settings and tuning knobs)
# ---------------------------------------------------------------------------

Features {
    # Network identity
    NETWORK = "ExampleNet";

    # GeoIP — path to a MaxMind GeoLite2-City or GeoLite2-Country MMDB file.
    # Download from https://dev.maxmind.com/geoip/geolite2-free-geolocation-data
    # MMDB_FILE = "/etc/ircd/GeoLite2-Country.mmdb";

    # TLS certificate and key (can also be set via SSL_CERT / SSL_KEY env vars)
    SSL_CERTFILE = "/etc/ircd/server.crt";
    SSL_KEYFILE  = "/etc/ircd/server.key";

    # Git-based config sync
    # Pull the config repo on startup and every GIT_SYNC_INTERVAL seconds.
    # A /GITSYNC command forces an immediate pull.
    # GIT_CONFIG_PATH          = "/etc/ircd/config-repo";
    # GIT_SYNC_INTERVAL        = "300";           # seconds between pulls
    # GITSYNC_SSH_KEY          = "/etc/ircd/deploy_key";  # SSH private key
    # GITSYNC_HOST_FINGERPRINT = "sha256:AAAA...";        # TOFU host key
    # GITSYNC_CERT_PATH        = "certs/server.crt";      # cert inside repo
    # GITSYNC_CERT_FILE        = "/etc/ircd/server.crt";  # install destination

    # Per-IP clone throttle (IPcheck)
    IPCHECK_CLONE_LIMIT  = "4";    # max connections per IP in the window
    IPCHECK_CLONE_PERIOD = "40";   # rolling window in seconds

    # Nick-change rate limit (seconds between /NICK changes)
    NICK_DELAY = "30";

    # HIS (Hide Information from non-opers)
    # HIS_WHO_SERVERNAME  = "TRUE";
    # HIS_WHO_HOPCOUNT    = "TRUE";
    # HIS_WHOIS_IDLETIME  = "TRUE";
    # HIS_MAP             = "TRUE";
    # HIS_LINKS           = "TRUE";

    # Channel and user limits
    MAXCHANNELSPERUSER = "20";
    MAXBANS            = "50";

    # ISUPPORT advertised tokens (comma-separated; empty = server defaults)
    # ISUPPORT = "SAFELIST,WATCH=128,MONITOR=100";
};
